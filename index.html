document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

12,0.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);\">\n    <span style=\"display:flex;align-items:center;gap:8px;\">\n      <img src=\"d8b13740-8c11-4bac-b432-c28dadfa8dad\" alt=\"\" style=\"width:22px;height:22px;object-fit:contain;\">\n      <span style=\"font-size:15px;font-weight:700;letter-spacing:0.16em;color:var(--ink);\">NERI FILMS<\u002Fspan>\n    <\u002Fspan>\n    <a href=\"{{ heroWaLink }}\" target=\"_blank\" rel=\"noopener\" style=\"padding:10px 18px;background:var(--brass);color:#161310;font-weight:600;font-size:13px;text-decoration:none;\">\n      WhatsApp\n    <\u002Fa>\n  <\u002Fheader>\n\n  <main>\n    <section style=\"position:relative;display:flex;flex-direction:column;\">\n      <div style=\"position:relative;height:56vh;min-height:340px;max-height:560px;overflow:hidden;background:#3a342a;\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"fa4b4428-234a-47b1-aa9b-4f280503b101#/image-slot.js\" id=\"hero-property\" shape=\"rect\" fit=\"cover\" placeholder=\"Sube aquí una foto de una propiedad de lujo\" src=\"https://images.unsplash.com/photo-1757359056339-22968344cce6?fm=jpg&amp;q=80&amp;w=2000&amp;auto=format&amp;fit=crop\" credit=\"Photo by Michael Brown on Unsplash\" credit-href=\"https://unsplash.com/@vettexan\" style=\"width:100%;height:100%;filter:saturate(0.88) contrast(1.05);\" hint-size=\"100%,100%\"><\u002Fx-import>\n        <div style=\"position:absolute;inset:0;box-shadow:inset 0 0 140px 30px rgba(0,0,0,0.55);pointer-events:none;\"><\u002Fdiv>\n        <div style=\"position:absolute;top:0;left:0;right:0;height:14px;background:var(--bg);\"><\u002Fdiv>\n        <div style=\"position:absolute;bottom:0;left:0;right:0;height:14px;background:var(--bg);\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(11,11,12,0) 26%);pointer-events:none;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;padding:clamp(36px,7vw,56px) clamp(20px,6vw,64px) clamp(60px,9vw,90px);animation:fadeUp 0.8s ease both;\">\n        <svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" style=\"margin-bottom:18px;\">\n          <path d=\"M4 8h2.5l1-2h9l1 2H20a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z\" stroke=\"#c9a24a\" stroke-width=\"1.3\"><\u002Fpath>\n          <circle cx=\"12\" cy=\"13.5\" r=\"3.6\" stroke=\"#c9a24a\" stroke-width=\"1.3\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div style=\"display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border:1px solid var(--brass-soft);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--brass);margin-bottom:26px;\">\n          <span style=\"width:6px;height:6px;border-radius:50%;background:var(--rec);\"><\u002Fspan>\n          Entrega en 24 horas\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Bodoni Moda',serif;font-weight:500;font-size:clamp(32px,7.5vw,60px);line-height:1.1;margin:0 0 10px;letter-spacing:-0.01em;max-width:680px;\">\n          Toda propiedad es una locación.\n        <\u002Fh1>\n        <p style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-weight:500;font-size:clamp(24px,5vw,36px);line-height:1.15;color:var(--brass);margin:0 0 22px;\">\n          Pocas se filman como tal.\n        <\u002Fp>\n        <p style=\"font-size:clamp(15px,2.4vw,17px);line-height:1.6;color:var(--ink-dim);max-width:460px;margin:0 0 32px;\">\n          Dirigimos, grabamos y editamos tu propiedad como el escenario de una producción — porque lo es.\n        <\u002Fp>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n          <a href=\"#planes\" style=\"padding:15px 28px;background:var(--ink);color:#161310;font-weight:600;font-size:14px;text-decoration:none;\">Ver planes y precios<\u002Fa>\n          <a href=\"{{ heroWaLink }}\" target=\"_blank\" rel=\"noopener\" style=\"padding:15px 28px;border:1px solid var(--line);color:var(--ink);font-weight:600;font-size:14px;text-decoration:none;\">Hablar por WhatsApp<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:clamp(70px,14vw,120px) clamp(20px,6vw,64px);border-top:1px solid var(--line);\">\n      <span style=\"display:block;text-align:center;font-size:12px;letter-spacing:0.2em;color:var(--brass);text-transform:uppercase;margin-bottom:50px;\">El problema<\u002Fspan>\n      <div style=\"max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:46px;\">\n        <div style=\"text-align:center;\">\n          <span style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:22px;color:var(--brass-soft);\">01<\u002Fspan>\n          <p style=\"font-size:clamp(22px,5.5vw,30px);line-height:1.35;margin:10px 0 0;\">Publicas fotos y esperas que alguien se imagine el resto.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <span style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:22px;color:var(--brass-soft);\">02<\u002Fspan>\n          <p style=\"font-size:clamp(22px,5.5vw,30px);line-height:1.35;margin:10px 0 0;\">Sin video, tu propiedad ya arrancó en desventaja frente a las que sí lo tienen.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <span style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:22px;color:var(--brass-soft);\">03<\u002Fspan>\n          <p style=\"font-size:clamp(22px,5.5vw,30px);line-height:1.35;margin:10px 0 0;\">¿Ya grabas video? Si no se siente como cine, tampoco está funcionando.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:clamp(70px,14vw,120px) clamp(20px,6vw,64px);background:var(--bg2);text-align:center;\">\n      <span style=\"font-size:12px;letter-spacing:0.2em;color:var(--brass);text-transform:uppercase;\">La producción<\u002Fspan>\n      <p style=\"font-family:'Bodoni Moda',serif;font-weight:500;font-size:clamp(28px,7vw,48px);line-height:1.2;margin:22px auto 26px;max-width:680px;\">Cada detalle, diseñado para vender.<\u002Fp>\n      <p style=\"font-size:16px;line-height:1.7;color:var(--ink-dim);max-width:480px;margin:0 auto 40px;\">No hacemos \"un video de la casa\". Diseñamos una pieza con dirección de arte, ritmo editorial y color grade — pensada para detener el scroll y generar la primera llamada.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:480px;margin:0 auto;\">\n        <span style=\"padding:10px 16px;border:1px solid var(--line);font-size:13px;color:var(--ink);\">Dirección de fotografía<\u002Fspan>\n        <span style=\"padding:10px 16px;border:1px solid var(--line);font-size:13px;color:var(--ink);\">Color grade cinematográfico<\u002Fspan>\n        <span style=\"padding:10px 16px;border:1px solid var(--line);font-size:13px;color:var(--ink);\">Reels / TikTok / YouTube<\u002Fspan>\n        <span style=\"padding:10px 16px;border:1px solid var(--line);font-size:13px;color:var(--ink);\">Música con licencia<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:clamp(60px,12vw,100px) clamp(20px,6vw,64px);border-top:1px solid var(--line);max-width:760px;margin:0 auto;display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap;\">\n      <div style=\"flex-shrink:0;width:96px;height:96px;border-radius:50%;overflow:hidden;border:1px solid var(--brass-soft);\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"fa4b4428-234a-47b1-aa9b-4f280503b101#/image-slot.js\" id=\"gabriel-photo\" shape=\"circle\" fit=\"cover\" placeholder=\"Foto\" src=\"uploads/FOTO%20ENRIQUE%20NERI.PNG\" style=\"width:100%;height:100%;\" hint-size=\"96px,96px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:240px;\">\n        <p style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:clamp(22px,4.5vw,30px);line-height:1.5;margin:0;color:var(--ink);\">\n          \"No soy un videógrafo. Soy publicista y productor creativo con más de 20 años de experiencia — y hoy pongo eso al servicio de tus propiedades. Entiendo qué vende un espacio, no solo cómo grabarlo.\"\n        <\u002Fp>\n        <p style=\"font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-dim);margin:22px 0 0;\">— Gabriel Neri, Neri Films<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:clamp(70px,14vw,120px) clamp(20px,6vw,64px);\">\n      <span style=\"display:block;text-align:center;font-size:12px;letter-spacing:0.2em;color:var(--brass);text-transform:uppercase;margin-bottom:14px;\">Cómo funciona<\u002Fspan>\n      <h2 style=\"font-family:'Bodoni Moda',serif;font-weight:500;font-size:clamp(26px,6.5vw,42px);margin:0 0 50px;text-align:center;line-height:1.15;\">De la propiedad a redes en 24 horas.<\u002Fh2>\n      <div style=\"max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:0;\">\n        <div style=\"display:flex;align-items:center;gap:20px;padding:22px 0;border-top:1px solid var(--line);\">\n          <span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;border:1px solid var(--brass);color:var(--brass);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-style:italic;\">1<\u002Fspan>\n          <p style=\"font-size:16px;line-height:1.5;margin:0;\">Elige tu plan — tú grabas o vamos nosotros.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;padding:22px 0;border-top:1px solid var(--line);\">\n          <span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-style:italic;\">2<\u002Fspan>\n          <p style=\"font-size:16px;line-height:1.5;margin:0;\">Compartes el material o agendamos la visita.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;padding:22px 0;border-top:1px solid var(--line);\">\n          <span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-style:italic;\">3<\u002Fspan>\n          <p style=\"font-size:16px;line-height:1.5;margin:0;\">Producimos: edición, color y ritmo cinematográfico.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;padding:22px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);\">\n          <span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--brass);color:#161310;display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-style:italic;\">4<\u002Fspan>\n          <p style=\"font-size:16px;line-height:1.5;margin:0;\">Recibes tu video listo para publicar. En 24 horas.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"planes\" style=\"padding:clamp(70px,14vw,120px) clamp(20px,6vw,64px);background:var(--bg2);\">\n      <span style=\"display:block;text-align:center;font-size:12px;letter-spacing:0.2em;color:var(--brass);text-transform:uppercase;margin-bottom:14px;\">Planes<\u002Fspan>\n      <h2 style=\"font-family:'Bodoni Moda',serif;font-weight:500;font-size:clamp(26px,6.5vw,42px);margin:0 0 50px;text-align:center;line-height:1.15;\">Dos formas de trabajar.<\u002Fh2>\n      <div style=\"max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"padding:32px 28px;border:1px solid var(--line);display:flex;flex-direction:column;\">\n          <span style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-dim);\">Tú grabas<\u002Fspan>\n          <div style=\"display:flex;align-items:baseline;gap:6px;margin:14px 0 18px;\">\n            <span style=\"font-family:'Bodoni Moda',serif;font-size:44px;\">$800<\u002Fspan>\n            <span style=\"font-size:13px;color:var(--ink-dim);\">MXN<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.6;color:var(--ink-dim);margin:0 0 22px;\">Subes tus propios clips a la plataforma y nosotros hacemos el resto.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:26px;font-size:14px;\">\n            <span>— Edición cinematográfica profesional<\u002Fspan>\n            <span>— Color grade + música con licencia<\u002Fspan>\n            <span>— Formatos Reels / TikTok / YouTube<\u002Fspan>\n            <span>— Entrega en 24 horas<\u002Fspan>\n          <\u002Fdiv>\n          <a href=\"{{ plan800WaLink }}\" target=\"_blank\" rel=\"noopener\" style=\"text-align:center;padding:15px;border:1px solid var(--ink);color:var(--ink);text-decoration:none;font-weight:600;font-size:14px;\">Quiero este plan<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"padding:36px 28px;background:var(--bg);border:1.5px solid var(--brass);display:flex;flex-direction:column;position:relative;\">\n          <span style=\"position:absolute;top:-13px;left:28px;background:var(--brass);color:#161310;font-size:11px;font-weight:700;letter-spacing:0.06em;padding:5px 14px;\">MÁS ELEGIDO<\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--brass);margin-top:6px;\">Vamos nosotros<\u002Fspan>\n          <div style=\"display:flex;align-items:baseline;gap:6px;margin:14px 0 18px;\">\n            <span style=\"font-family:'Bodoni Moda',serif;font-size:52px;\">$1,200<\u002Fspan>\n            <span style=\"font-size:13px;color:var(--ink-dim);\">MXN<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.6;color:var(--ink-dim);margin:0 0 24px;\">Vamos a la propiedad con equipo profesional y dirigimos la grabación completa.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:28px;font-size:14px;\">\n            <span>— Todo lo del plan Tú grabas<\u002Fspan>\n            <span>— Visita y grabación en sitio<\u002Fspan>\n            <span>— Dirección de producción profesional<\u002Fspan>\n            <span>— Equipo cinematográfico (gimbal / drone opcional)<\u002Fspan>\n          <\u002Fdiv>\n          <a href=\"{{ plan1200WaLink }}\" target=\"_blank\" rel=\"noopener\" style=\"text-align:center;padding:16px;background:var(--brass);color:#161310;text-decoration:none;font-weight:700;font-size:15px;\">Quiero este plan<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:clamp(70px,14vw,130px) clamp(20px,6vw,64px);text-align:center;\">\n      <span style=\"font-size:12px;letter-spacing:0.2em;color:var(--brass);text-transform:uppercase;\">Bonus · Solo para clientes<\u002Fspan>\n      <p style=\"font-family:'Bodoni Moda',serif;font-weight:500;font-size:clamp(26px,6.5vw,42px);line-height:1.3;margin:22px auto 26px;max-width:640px;\">El video atrae al cliente. Un sistema evita que se te escape y lo convierte en dinero.<\u002Fp>\n      <p style=\"font-size:16px;line-height:1.7;color:var(--ink-dim);max-width:540px;margin:0 auto 30px;\">Detrás de cada propiedad hay una operación completa, con folio único y alertas que avisan cuándo algo se enfría. Tu comprador ve su avance en tiempo real — como una compra en Amazon — hasta la entrega de llaves, todo documentado, todo auditado, nada en la memoria de nadie.<\u002Fp>\n      <div style=\"max-width:560px;margin:0 auto 34px;display:flex;align-items:flex-start;justify-content:space-between;position:relative;text-align:left;\">\n        <div style=\"position:absolute;top:9px;left:0;right:0;height:1px;background:var(--line);\"><\u002Fdiv>\n        <div style=\"position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;\">\n          <span style=\"width:18px;height:18px;border-radius:50%;background:var(--brass);border:1px solid var(--brass);z-index:1;\"><\u002Fspan>\n          <span style=\"font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-dim);text-align:center;\">Captación<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;\">\n          <span style=\"width:18px;height:18px;border-radius:50%;background:var(--bg2);border:1px solid var(--brass);z-index:1;\"><\u002Fspan>\n          <span style=\"font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-dim);text-align:center;\">Expediente<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;\">\n          <span style=\"width:18px;height:18px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);z-index:1;\"><\u002Fspan>\n          <span style=\"font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-dim);text-align:center;\">Producción<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;\">\n          <span style=\"width:18px;height:18px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);z-index:1;\"><\u002Fspan>\n          <span style=\"font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-dim);text-align:center;\">Comercialización<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;\">\n          <span style=\"width:18px;height:18px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);z-index:1;\"><\u002Fspan>\n          <span style=\"font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-dim);text-align:center;\">Cierre<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:13px;color:var(--ink-dim);max-width:480px;margin:0 auto 30px;\">Pregúntame de qué se trata cuando hablemos.<\u002Fp>\n      <a href=\"{{ bonusWaLink }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;padding:16px 30px;border:1px solid var(--brass);color:var(--brass);text-decoration:none;font-weight:600;font-size:14px;\">Pregúntame por el sistema completo<\u002Fa>\n    <\u002Fsection>\n\n    <section id=\"empezar\" style=\"padding:clamp(70px,14vw,120px) clamp(20px,6vw,64px);background:var(--bg2);\">\n      <span style=\"display:block;text-align:center;font-size:12px;letter-spacing:0.2em;color:var(--brass);text-transform:uppercase;margin-bottom:14px;\">Empezar<\u002Fspan>\n      <h2 style=\"font-family:'Bodoni Moda',serif;font-weight:500;font-size:clamp(26px,6.5vw,42px);margin:0 0 50px;text-align:center;line-height:1.15;\">Cuéntame de tu propiedad.<\u002Fh2>\n      <div style=\"max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:26px;\">\n        <label style=\"display:flex;flex-direction:column;gap:8px;\">\n          <span style=\"font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);\">Nombre<\u002Fspan>\n          <input value=\"{{ formName }}\" sc-camel-on-change=\"{{ onNameChange }}\" style=\"background:transparent;border:none;border-bottom:1px solid var(--line);padding:10px 0;color:var(--ink);font-size:17px;font-family:inherit;outline:none;\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:8px;\">\n          <span style=\"font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);\">Teléfono / WhatsApp<\u002Fspan>\n          <input value=\"{{ formPhone }}\" sc-camel-on-change=\"{{ onPhoneChange }}\" style=\"background:transparent;border:none;border-bottom:1px solid var(--line);padding:10px 0;color:var(--ink);font-size:17px;font-family:inherit;outline:none;\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:8px;\">\n          <span style=\"font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);\">Zona o dirección de la propiedad<\u002Fspan>\n          <input value=\"{{ formZone }}\" sc-camel-on-change=\"{{ onZoneChange }}\" style=\"background:transparent;border:none;border-bottom:1px solid var(--line);padding:10px 0;color:var(--ink);font-size:17px;font-family:inherit;outline:none;\">\n        <\u002Flabel>\n        <div>\n          <span style=\"font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);display:block;margin-bottom:12px;\">Plan<\u002Fspan>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n            <button sc-camel-on-click=\"{{ selectPlan800 }}\" style=\"{{ plan800BtnStyle }}\">Tú grabas · $800<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ selectPlan1200 }}\" style=\"{{ plan1200BtnStyle }}\">Vamos nosotros · $1,200<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <label style=\"display:flex;flex-direction:column;gap:8px;\">\n          <span style=\"font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);\">Fecha propuesta<\u002Fspan>\n          <input type=\"date\" value=\"{{ formDate }}\" sc-camel-on-change=\"{{ onDateChange }}\" style=\"background:transparent;border:none;border-bottom:1px solid var(--line);padding:10px 0;color:var(--ink);font-size:17px;font-family:inherit;outline:none;color-scheme:dark;\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:8px;\">\n          <span style=\"font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);\">Notas<\u002Fspan>\n          <textarea placeholder=\"Link de tus videos, horario preferido, referencias, etc.\" value=\"{{ formNotes }}\" sc-camel-on-change=\"{{ onNotesChange }}\" rows=\"3\" style=\"background:transparent;border:none;border-bottom:1px solid var(--line);padding:10px 0;color:var(--ink);font-size:16px;font-family:inherit;outline:none;resize:vertical;\"><\u002Ftextarea>\n        <\u002Flabel>\n        <div style=\"padding-top:18px;border-top:1px solid var(--line);\">\n          <span style=\"font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);\">Resumen<\u002Fspan>\n          <p style=\"font-size:22px;font-family:'Bodoni Moda',serif;margin:12px 0 10px;\">{{ planSummaryLabel }}<\u002Fp>\n          <p style=\"font-size:13px;color:var(--ink-dim);line-height:1.6;margin:0 0 22px;\">Al enviar, se abre WhatsApp con tus datos listos para confirmar la producción. Ninguna tarjeta ni pago se procesa aquí.<\u002Fp>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ submitForm }}\" style=\"padding:17px;background:var(--brass);border:none;color:#161310;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;\">Enviar por WhatsApp<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n  <footer style=\"padding:clamp(50px,10vw,64px) clamp(20px,6vw,64px);display:flex;flex-direction:column;align-items:center;gap:18px;border-top:1px solid var(--line);text-align:center;\">\n    <span style=\"display:flex;align-items:center;gap:8px;\">\n      <img src=\"d8b13740-8c11-4bac-b432-c28dadfa8dad\" alt=\"\" style=\"width:22px;height:22px;object-fit:contain;\">\n      <span style=\"font-size:16px;font-weight:700;letter-spacing:0.12em;\">NERI FILMS<\u002Fspan>\n    <\u002Fspan>\n    <p style=\"font-size:13px;color:var(--ink-dim);margin:0;\">Gabriel Neri<\u002Fp>\n    <div style=\"display:flex;gap:24px;\">\n      <a href=\"{{ heroWaLink }}\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--ink);text-decoration:none;font-size:14px;border-bottom:1px solid var(--line);padding-bottom:2px;\">WhatsApp<\u002Fa>\n      <a href=\"https://www.instagram.com/enriqueneri_c21haus?igsh=bXd1Z3loMmE1OGh1&amp;utm_source=qr\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--ink);text-decoration:none;font-size:14px;border-bottom:1px solid var(--line);padding-bottom:2px;\">Instagram<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    formName: '',\n    formPhone: '',\n    formZone: '',\n    formDate: '',\n    formNotes: '',\n    plan: 'nosotros'\n  };\n\n  buildWaLink(text) {\n    return 'https://wa.me/527779855687?text=' + encodeURIComponent(text);\n  }\n\n  handleSubmit() {\n    var s = this.state;\n    var planLabel = s.plan === 'nosotros' ? 'Vamos nosotros (1200 MXN)' : 'Tu grabas (800 MXN)';\n    var parts = [];\n    parts.push('Hola Gabriel, quiero agendar una produccion de video inmobiliario.');\n    parts.push('Nombre: ' + (s.formName || '-'));\n    parts.push('Telefono: ' + (s.formPhone || '-'));\n    parts.push('Zona/direccion: ' + (s.formZone || '-'));\n    parts.push('Plan: ' + planLabel);\n    if (s.formDate) { parts.push('Fecha propuesta: ' + s.formDate); }\n    if (s.formNotes) { parts.push('Notas: ' + s.formNotes); }\n    window.open(this.buildWaLink(parts.join('\\n')), '_blank');\n  }\n\n  renderVals() {\n    var s = this.state;\n    var self = this;\n    var activeStyle = 'padding:12px 18px;border:1px solid var(--brass);background:var(--brass);color:#161310;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;';\n    var inactiveStyle = 'padding:12px 18px;border:1px solid var(--line);background:transparent;color:var(--ink);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;';\n    return {\n      heroWaLink: this.buildWaLink('Hola Gabriel, vi tu landing y quiero informacion sobre produccion de video para mi propiedad.'),\n      bonusWaLink: this.buildWaLink('Hola, me interesa saber mas sobre el sistema operativo inmobiliario.'),\n      plan800WaLink: this.buildWaLink('Hola, me interesa el plan TU GRABAS (800 MXN) para produccion de video inmobiliario.'),\n      plan1200WaLink: this.buildWaLink('Hola, me interesa el plan VAMOS NOSOTROS (1200 MXN) para produccion de video inmobiliario.'),\n      formName: s.formName,\n      formPhone: s.formPhone,\n      formZone: s.formZone,\n      formDate: s.formDate,\n      formNotes: s.formNotes,\n      onNameChange: function (e) { self.setState({ formName: e.target.value }); },\n      onPhoneChange: function (e) { self.setState({ formPhone: e.target.value }); },\n      onZoneChange: function (e) { self.setState({ formZone: e.target.value }); },\n      onDateChange: function (e) { self.setState({ formDate: e.target.value }); },\n      onNotesChange: function (e) { self.setState({ formNotes: e.target.value }); },\n      selectPlan800: function () { self.setState({ plan: 'tu' }); },\n      selectPlan1200: function () { self.setState({ plan: 'nosotros' }); },\n      plan800BtnStyle: s.plan === 'tu' ? activeStyle : inactiveStyle,\n      plan1200BtnStyle: s.plan === 'nosotros' ? activeStyle : inactiveStyle,\n      planSummaryLabel: s.plan === 'nosotros' ? 'Vamos nosotros - 1200 MXN' : 'Tu grabas - 800 MXN',\n      submitForm: function () { self.handleSubmit(); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
